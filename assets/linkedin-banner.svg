<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Software engineer. Measurably correct, demonstrably fair.">
  <!-- MIDNIGHT ATLAS · LinkedIn banner · 1584x396
       Safe zone: centered 1200x300 (x 192-1392, y 48-348). All text lives right of
       x=600 so the bottom-left profile photo and left third stay clear.
       Static on purpose: this file is exported to PNG for LinkedIn. -->
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e3a857" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#e3a857" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1584" height="396" fill="url(#ink)"/>

  <!-- graticule -->
  <g stroke="#eae7db" stroke-opacity="0.04" stroke-width="1">
    <path d="M132 0V396M264 0V396M396 0V396M528 0V396M660 0V396M792 0V396M924 0V396M1056 0V396M1188 0V396M1320 0V396M1452 0V396"/>
    <path d="M0 99H1584M0 198H1584M0 297H1584"/>
  </g>

  <!-- faint contours drifting up from the lower left, behind the photo area -->
  <g fill="none" stroke="#8fd6c5" stroke-opacity="0.09" stroke-width="1">
    <path d="M0 330 C 220 300, 420 320, 640 296 C 900 268, 1200 292, 1584 258"/>
    <path d="M0 366 C 240 340, 460 356, 700 334 C 960 310, 1260 330, 1584 300"/>
  </g>
  <path d="M0 292 C 240 258, 460 280, 700 252 C 960 222, 1260 248, 1584 210" fill="none" stroke="#e3a857" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="5 8"/>

  <!-- quiet stars, kept off the text block -->
  <g fill="#eae7db">
    <circle cx="700" cy="70" r="1.4" opacity="0.30"/>
    <circle cx="905" cy="52" r="1.1" opacity="0.24"/>
    <circle cx="1105" cy="84" r="1.5" opacity="0.30"/>
    <circle cx="1262" cy="58" r="1.1" opacity="0.22"/>
    <circle cx="1490" cy="200" r="1.3" opacity="0.26"/>
    <circle cx="1440" cy="310" r="1.2" opacity="0.22"/>
    <circle cx="250" cy="80" r="1.2" opacity="0.18"/>
    <circle cx="420" cy="130" r="1.0" opacity="0.15"/>
  </g>
  <text x="1330" y="176" font-family="Georgia, serif" font-size="17" fill="#e3a857" opacity="0.7">✦</text>

  <!-- sonar reticle, far right -->
  <g>
    <circle cx="1462" cy="112" r="3" fill="#e3a857"/>
    <g stroke="#e3a857" stroke-opacity="0.6" stroke-width="1">
      <path d="M1462 94v7M1462 123v7M1444 112h7M1473 112h7"/>
    </g>
    <circle cx="1462" cy="112" r="26" fill="none" stroke="#e3a857" stroke-opacity="0.30" stroke-width="1"/>
    <circle cx="1462" cy="112" r="44" fill="none" stroke="#e3a857" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- coordinates, top right -->
  <text x="1386" y="66" text-anchor="end" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="16" letter-spacing="2" fill="#716e64">CHICAGO, IL · 41.8781°N 87.6298°W</text>

  <!-- glow behind the text block -->
  <ellipse cx="900" cy="210" rx="480" ry="170" fill="url(#glow)"/>

  <!-- text block · starts at x 600, leaving the left third clear -->
  <text x="600" y="132" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="21" letter-spacing="5" fill="#a9a496">SOFTWARE ENGINEER · AI/ML · FULL-STACK</text>

  <text x="597" y="212" font-family="Georgia, 'Times New Roman', serif" font-size="62" letter-spacing="-1" fill="#eae7db">Measurably <tspan font-style="italic">correct</tspan>.</text>
  <text x="597" y="284" font-family="Georgia, 'Times New Roman', serif" font-size="62" letter-spacing="-1" fill="#eae7db">Demonstrably <tspan font-style="italic" fill="#e3a857">fair</tspan>.</text>

  <line x1="600" y1="312" x2="1392" y2="312" stroke="#eae7db" stroke-opacity="0.16" stroke-width="1"/>

  <text x="600" y="342" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="17" letter-spacing="2" fill="#716e64">GSOC 2025 <tspan fill="#e3a857">✦</tspan> ASE 2026 <tspan fill="#e3a857">✦</tspan> NEURIPS 2023 <tspan fill="#e3a857">✦</tspan> ARCHITR.VERCEL.APP</text>
