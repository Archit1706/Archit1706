<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="url(#bg)"/>
  <circle cx="1030" cy="150" r="210" fill="#f59e0b" fill-opacity="0.08">
    <animate attributeName="r" values="210;234;210" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="560" r="150" fill="#f59e0b" fill-opacity="0.06"/>
  <rect x="0" y="0" width="12" height="600" fill="#f59e0b"/>

  <g transform="translate(880,150)">
    <rect x="0" y="0" width="230" height="290" rx="14" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="30" y="42" width="150" height="12" rx="6" fill="#64748b"/>
    <rect x="30" y="78" width="120" height="12" rx="6" fill="#64748b"/>
    <rect x="30" y="114" width="168" height="12" rx="6" fill="#f59e0b"/>
    <rect x="30" y="150" width="100" height="12" rx="6" fill="#64748b"/>
    <rect x="30" y="186" width="140" height="12" rx="6" fill="#64748b"/>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 26 56; 0 0" dur="5.5s" repeatCount="indefinite"/>
      <circle cx="150" cy="178" r="60" fill="#f59e0b" fill-opacity="0.12" stroke="#fbbf24" stroke-width="12"/>
      <line x1="194" y1="222" x2="246" y2="274" stroke="#fbbf24" stroke-width="15" stroke-linecap="round"/>
    </g>
  </g>

  <text x="80" y="112" fill="#fbbf24" font-size="25" font-weight="700" letter-spacing="4">NORTHWESTERN GAIN CHALLENGE</text>
  <text x="76" y="250" fill="#ffffff" font-size="96" font-weight="800" letter-spacing="-2">FairGuard</text>
  <text x="80" y="320" fill="#e2e8f0" font-size="35" font-weight="600">Agentic AI for investigative journalism</text>
  <text x="80" y="366" fill="#cbd5e1" font-size="26">Mapping revolving-door patterns across federal lobbying.</text>

  <g font-size="23" font-weight="700">
    <rect x="80" y="420" width="200" height="54" rx="27" fill="#f59e0b" fill-opacity="0.16"/>
    <text x="180" y="455" fill="#fde68a" text-anchor="middle">Claude Code</text>
    <rect x="296" y="420" width="210" height="54" rx="27" fill="#f59e0b" fill-opacity="0.16"/>
    <text x="401" y="455" fill="#fde68a" text-anchor="middle">1M+ records</text>
    <rect x="522" y="420" width="200" height="54" rx="27" fill="#f59e0b" fill-opacity="0.16"/>
    <text x="622" y="455" fill="#fde68a" text-anchor="middle">23 agencies</text>
  </g>
