<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Archit Rathod, software engineer and ML fairness researcher">
  <!-- MIDNIGHT ATLAS · profile banner · palette synced with architr.vercel.app -->
  <defs>
    <linearGradient id="inkfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e3a857" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#e3a857" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#inkfade)"/>

  <!-- graticule -->
  <g stroke="#eae7db" stroke-opacity="0.045" stroke-width="1">
    <path d="M88 0V360M176 0V360M264 0V360M352 0V360M440 0V360M528 0V360M616 0V360M704 0V360M792 0V360M880 0V360M968 0V360M1056 0V360M1144 0V360"/>
    <path d="M0 88H1200M0 176H1200M0 264H1200"/>
  </g>

  <!-- bathymetric contours, lower right -->
  <g fill="none" stroke="#8fd6c5" stroke-opacity="0.10" stroke-width="1">
    <path d="M760 360 C 830 300, 950 320, 1010 268 C 1060 224, 1140 232, 1200 200"/>
    <path d="M820 360 C 890 316, 990 334, 1050 290 C 1100 252, 1160 258, 1200 236"/>
    <path d="M900 360 C 960 334, 1040 348, 1096 312 C 1140 284, 1176 286, 1200 272"/>
  </g>
  <path d="M700 360 C 780 288, 910 306, 976 248 C 1030 200, 1120 208, 1200 168" fill="none" stroke="#e3a857" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="5 7">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="14s" repeatCount="indefinite"/>
  </path>

  <!-- map frame + corner ticks -->
  <rect x="14" y="14" width="1172" height="332" fill="none" stroke="#eae7db" stroke-opacity="0.12" stroke-width="1"/>
  <g stroke="#eae7db" stroke-opacity="0.30" stroke-width="1">
    <path d="M14 34V14H34M1166 14H1186V34M1186 326V346H1166M34 346H14V326"/>
  </g>
  <!-- frame ticks -->
  <g stroke="#eae7db" stroke-opacity="0.15" stroke-width="1">
    <path d="M214 14v5M414 14v5M614 14v5M814 14v5M1014 14v5"/>
    <path d="M214 346v-5M414 346v-5M614 346v-5M814 346v-5M1014 346v-5"/>
    <path d="M14 100h5M14 186h5M14 272h5M1186 100h-5M1186 186h-5M1186 272h-5"/>
  </g>

  <!-- annotations -->
  <text x="46" y="56" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="16" letter-spacing="3" fill="#d8d3c5">SOFTWARE ENGINEER &amp; ML FAIRNESS RESEARCHER</text>
  <text x="1154" y="56" text-anchor="end" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="16" letter-spacing="2" fill="#b3ae9f">FIG. 01 · PROFILE</text>
  <text x="1154" y="78" text-anchor="end" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="16" letter-spacing="2" fill="#b3ae9f">CHICAGO, IL · 41.8781°N 87.6298°W</text>

  <!-- glow behind name -->
  <ellipse cx="330" cy="185" rx="420" ry="150" fill="url(#glow)"/>

  <!-- name · serif, italic gold o as on the site -->
  <text x="44" y="212" font-family="Georgia, 'Times New Roman', serif" font-size="98" letter-spacing="-2" fill="#eae7db">Archit Rath<tspan font-style="italic" fill="#e3a857">o</tspan>d<animate attributeName="opacity" from="0" to="1" dur="1.1s" fill="freeze"/></text>

  <!-- tagline -->
  <text x="46" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#d8d3c5" opacity="0">Systems that are <tspan fill="#eae7db">measurably correct</tspan> and <tspan fill="#eae7db">demonstrably fair</tspan>.<animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/></text>

  <!-- sonar reticle, upper right of center -->
  <g>
    <circle cx="1044" cy="168" r="3.5" fill="#e3a857"/>
    <g stroke="#e3a857" stroke-opacity="0.7" stroke-width="1">
      <path d="M1044 148v8M1044 180v8M1024 168h8M1056 168h8"/>
    </g>
    <circle cx="1044" cy="168" r="10" fill="none" stroke="#e3a857" stroke-width="1">
      <animate attributeName="r" values="8;58" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.55;0" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1044" cy="168" r="10" fill="none" stroke="#e3a857" stroke-width="1">
      <animate attributeName="r" values="8;58" dur="3.4s" begin="1.7s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.55;0" dur="3.4s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- scattered survey stars -->
  <g fill="#eae7db">
    <circle cx="905" cy="110" r="1.6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="130" r="1.3" opacity="0.35">
      <animate attributeName="opacity" values="0.15;0.6;0.15" dur="3.1s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="220" r="1.4" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.55;0.15" dur="5s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="1112" y="228" font-family="Georgia, serif" font-size="15" fill="#e3a857" opacity="0.8">✦<animate attributeName="opacity" values="0.4;0.95;0.4" dur="3.6s" repeatCount="indefinite"/></text>

  <!-- rule that draws itself -->
  <line x1="44" y1="292" x2="44" y2="292" stroke="#eae7db" stroke-opacity="0.16" stroke-width="1">
    <animate attributeName="x2" from="44" to="1156" dur="1.3s" begin="0.3s" fill="freeze"/>
  </line>

  <!-- credentials ticker -->
  <text x="46" y="325" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="16" letter-spacing="1" fill="#b3ae9f" opacity="0">GSOC 2025 · OPENSTREETMAP <tspan fill="#e3a857">✦</tspan> ASE 2026 <tspan fill="#e3a857">✦</tspan> NEURIPS 2023 <tspan fill="#e3a857">✦</tspan> SPRINGER ×2 <tspan fill="#e3a857">✦</tspan> MS CS · UIC <tspan fill="#e3a857">✦</tspan> RELFAIR · PYPI<animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.9s" fill="freeze"/></text>
</svg>
