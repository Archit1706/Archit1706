      <animate attributeName="r" values="42;98;42" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M1015 150 C1073 150 1117 194 1117 248 C1117 318 1015 398 1015 398 C1015 398 913 318 913 248 C913 194 957 150 1015 150 Z" fill="#ffffff" fill-opacity="0.96"/>
    <circle cx="1015" cy="246" r="38" fill="#2563eb"/>
  </g>

  <g transform="translate(935,452)">
    <circle cx="0" cy="0" r="9" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="8" fill="#ffffff" font-size="24" font-weight="700" letter-spacing="2">LIVE</text>
  </g>

  <text x="80" y="112" fill="#bfdbfe" font-size="25" font-weight="700" letter-spacing="5">GOOGLE SUMMER OF CODE 2025</text>
  <text x="74" y="246" fill="#ffffff" font-size="80" font-weight="800" letter-spacing="-2">OSM Road Closures</text>
  <text x="80" y="318" fill="#dbeafe" font-size="36" font-weight="600">Real-time temporary road closure reporting</text>
  <text x="80" y="366" fill="#c7d2fe" font-size="26">Built for and adopted by the OpenStreetMap community.</text>

  <g font-size="23" font-weight="700">
