<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="url(#bg)"/>
  <circle cx="1015" cy="140" r="210" fill="#ffffff" fill-opacity="0.06">
    <animate attributeName="r" values="210;232;210" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="560" r="150" fill="#ffffff" fill-opacity="0.05"/>

  <g>
