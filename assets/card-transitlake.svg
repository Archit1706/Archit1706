<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#134e4a"/>
      <stop offset="0.5" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="url(#bg)"/>
  <circle cx="1015" cy="140" r="205" fill="#ffffff" fill-opacity="0.06">
    <animate attributeName="r" values="205;226;205" dur="8.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="560" r="150" fill="#ffffff" fill-opacity="0.05"/>

  <g transform="translate(900,168)">
    <rect x="0" y="170" width="220" height="46" rx="10" fill="#b45309" fill-opacity="0.92"/>
    <rect x="0" y="110" width="220" height="46" rx="10" fill="#cbd5e1" fill-opacity="0.9"/>
    <rect x="0" y="50"  width="220" height="46" rx="10" fill="#fbbf24" fill-opacity="0.95"/>
    <g fill="#ffffff">
      <circle cx="44" cy="240" r="6"><animate attributeName="cy" values="244;26" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="240" r="6"><animate attributeName="cy" values="244;26" dur="3s" begin="-1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="-1s" repeatCount="indefinite"/></circle>
      <circle cx="176" cy="240" r="6"><animate attributeName="cy" values="244;26" dur="3s" begin="-2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="-2s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <text x="80" y="112" fill="#99f6e4" font-size="24" font-weight="700" letter-spacing="4">DATA ENGINEERING · LAKEHOUSE</text>
  <text x="74" y="250" fill="#ffffff" font-size="90" font-weight="800" letter-spacing="-2">TransitLake</text>
  <text x="80" y="320" fill="#cffafe" font-size="34" font-weight="600">Dagster medallion lakehouse for transit</text>
  <text x="80" y="366" fill="#a5f3fc" font-size="25">Chicago GTFS, real-time and weather, modeled on DuckDB.</text>

  <g font-size="23" font-weight="700">
    <rect x="80" y="420" width="160" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="160" y="455" fill="#ffffff" text-anchor="middle">Dagster</text>
    <rect x="256" y="420" width="110" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="311" y="455" fill="#ffffff" text-anchor="middle">dbt</text>
    <rect x="382" y="420" width="150" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="457" y="455" fill="#ffffff" text-anchor="middle">DuckDB</text>
    <rect x="548" y="420" width="180" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="638" y="455" fill="#ffffff" text-anchor="middle">100+ checks</text>
  </g>
</svg>
