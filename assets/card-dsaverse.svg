<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a23"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="url(#bg)"/>
  <circle cx="1030" cy="150" r="205" fill="#22d3ee" fill-opacity="0.07">
    <animate attributeName="r" values="205;228;205" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="560" r="150" fill="#a78bfa" fill-opacity="0.07"/>

  <g transform="translate(865,40)">
    <rect x="0"   y="200" width="46" height="120" rx="8" fill="#6366f1">
      <animate attributeName="y" values="200;120;200" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="height" values="120;200;120" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="64"  y="120" width="46" height="200" rx="8" fill="#22d3ee">
      <animate attributeName="y" values="120;240;120" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="height" values="200;80;200" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="128" y="170" width="46" height="150" rx="8" fill="#a78bfa">
      <animate attributeName="y" values="170;90;170" dur="3.0s" repeatCount="indefinite"/>
      <animate attributeName="height" values="150;230;150" dur="3.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="192" y="90"  width="46" height="230" rx="8" fill="#6366f1">
      <animate attributeName="y" values="90;200;90" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="height" values="230;120;230" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="256" y="150" width="46" height="170" rx="8" fill="#22d3ee">
      <animate attributeName="y" values="150;70;150" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="height" values="170;250;170" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="80" y="112" fill="#c4b5fd" font-size="25" font-weight="700" letter-spacing="4">INTERACTIVE LEARNING PLATFORM</text>
  <text x="74" y="252" fill="#ffffff" font-size="98" font-weight="800" letter-spacing="-2">DSAverse</text>
  <text x="80" y="322" fill="#e0e7ff" font-size="35" font-weight="600">Master data structures and algorithms, visually</text>
  <text x="80" y="368" fill="#a5b4fc" font-size="26">Step-by-step animations. Watch the logic unfold.</text>

  <g font-size="23" font-weight="700">
    <rect x="80" y="422" width="190" height="54" rx="27" fill="#ffffff" fill-opacity="0.12"/>
    <text x="175" y="457" fill="#ffffff" text-anchor="middle">63+ Algorithms</text>
    <rect x="286" y="422" width="200" height="54" rx="27" fill="#ffffff" fill-opacity="0.12"/>
    <text x="386" y="457" fill="#ffffff" text-anchor="middle">54+ Demos</text>
    <rect x="502" y="422" width="130" height="54" rx="27" fill="#ffffff" fill-opacity="0.12"/>
    <text x="567" y="457" fill="#ffffff" text-anchor="middle">Free</text>
  </g>
</svg>
