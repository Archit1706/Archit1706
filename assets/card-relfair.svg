  </g>

  <text x="80" y="112" fill="#ddd6fe" font-size="25" font-weight="700" letter-spacing="5">OPEN SOURCE · PyPI</text>
  <text x="74" y="252" fill="#ffffff" font-size="104" font-weight="800" letter-spacing="-2">relfair</text>
  <text x="80" y="322" fill="#ede9fe" font-size="35" font-weight="600">Relationship-aware fairness testing for ML</text>
  <text x="80" y="368" fill="#c7d2fe" font-size="26">Counterfactuals that catch what naive flip-testing misses.</text>

  <g font-size="23" font-weight="700">
