      <stop offset="0" stop-color="#312e81"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="url(#bg)"/>
  <circle cx="1020" cy="150" r="205" fill="#ffffff" fill-opacity="0.06">
    <animate attributeName="r" values="205;226;205" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="560" r="150" fill="#ffffff" fill-opacity="0.05"/>

