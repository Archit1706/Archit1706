  </circle>

  <text x="64" y="32" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="19" letter-spacing="2" fill="#eae7db">OPEN TO SOFTWARE ENGINEERING · AI/ML · FULL-STACK ROLES <tspan fill="#e3a857">·</tspan> <tspan fill="#e3a857">2026</tspan></text>
  <text x="1162" y="32" text-anchor="end" font-family="Consolas, 'DejaVu Sans Mono', Menlo, monospace" font-size="18" letter-spacing="1" fill="#b3ae9f">ARATH21@UIC.EDU ↗</text>
</svg>
