<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f4d"/>
      <stop offset="0.55" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="24" fill="url(#bg)"/>
  <circle cx="1010" cy="140" r="210" fill="#ffffff" fill-opacity="0.06">
    <animate attributeName="r" values="210;232;210" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="560" r="150" fill="#ffffff" fill-opacity="0.05"/>

  <g transform="translate(1002,292)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="16s" repeatCount="indefinite"/>
      <circle r="84" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="9"/>
      <g stroke="#ffffff" stroke-opacity="0.9" stroke-width="8" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-84"/>
        <line x1="0" y1="0" x2="65.7" y2="-52.4"/>
        <line x1="0" y1="0" x2="81.9" y2="18.7"/>
        <line x1="0" y1="0" x2="36.5" y2="75.7"/>
        <line x1="0" y1="0" x2="-36.5" y2="75.7"/>
        <line x1="0" y1="0" x2="-81.9" y2="18.7"/>
        <line x1="0" y1="0" x2="-65.7" y2="-52.4"/>
      </g>
      <g fill="#ffffff">
        <circle cx="0" cy="-96" r="9"/>
        <circle cx="75.1" cy="-59.9" r="9"/>
        <circle cx="93.6" cy="21.4" r="9"/>
        <circle cx="41.7" cy="86.5" r="9"/>
        <circle cx="-41.7" cy="86.5" r="9"/>
        <circle cx="-93.6" cy="21.4" r="9"/>
        <circle cx="-75.1" cy="-59.9" r="9"/>
      </g>
      <circle r="22" fill="#ffffff"/>
    </g>
  </g>

  <g>
    <rect x="858" y="150" width="34" height="34" rx="7" fill="#ffffff" fill-opacity="0.85"><animate attributeName="fill-opacity" values="0.85;0.3;0.85" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="858" y="196" width="34" height="34" rx="7" fill="#ffffff" fill-opacity="0.6"><animate attributeName="fill-opacity" values="0.6;0.2;0.6" dur="2.4s" begin="-0.6s" repeatCount="indefinite"/></rect>
    <rect x="858" y="242" width="34" height="34" rx="7" fill="#ffffff" fill-opacity="0.4"><animate attributeName="fill-opacity" values="0.4;0.1;0.4" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/></rect>
  </g>

  <text x="80" y="112" fill="#bfdbfe" font-size="24" font-weight="700" letter-spacing="4">DEVOPS · PLATFORM ENGINEERING · SRE</text>
  <text x="74" y="250" fill="#ffffff" font-size="96" font-weight="800" letter-spacing="-2">GalaxyOps</text>
  <text x="80" y="320" fill="#dbeafe" font-size="34" font-weight="600">Production Kubernetes platform for ML inference</text>
  <text x="80" y="366" fill="#bfdbfe" font-size="25">Terraform, Helm and ArgoCD GitOps with a 99.9% SLO.</text>

  <g font-size="23" font-weight="700">
    <rect x="80" y="420" width="200" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="180" y="455" fill="#ffffff" text-anchor="middle">Kubernetes</text>
    <rect x="296" y="420" width="180" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="386" y="455" fill="#ffffff" text-anchor="middle">Terraform</text>
    <rect x="492" y="420" width="150" height="54" rx="27" fill="#ffffff" fill-opacity="0.16"/>
    <text x="567" y="455" fill="#ffffff" text-anchor="middle">ArgoCD</text>
  </g>
</svg>
